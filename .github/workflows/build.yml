name: Build devcontainer base

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 1"  # weekly, to pick up package updates
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository_owner }}/r-base
          cacheFrom: ghcr.io/${{ github.repository_owner }}/r-base
          push: always
